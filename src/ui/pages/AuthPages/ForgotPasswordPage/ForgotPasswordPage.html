<div class="centered-container">
    <div class="form-container-base">
        <!-- FORM STATE -->
        <div class="form-content" id="formContent">
            <div class="form-header-base forgot-password-header">
                <h2 class="form-title-base forgot-password-title">
                    Forgot your password?
                </h2>
                <p class="form-subtitle-base forgot-password-description">
                    It happens to the best of us. Enter your email or username to request
                    a password reset link.
                </p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="form-base" id="forgotPasswordForm">
                <div class="form-group-base">
                    <label for="email" class="sr-only">Email</label>
                    <input
                            class="form-input"
                            id="email"
                            name="email"
                            placeholder="Enter your email address"
                            required
                            type="email"
                            autocomplete="email"
                    />
                </div>

                <button class="btn btn-primary" type="submit">Reset Password</button>
            </form>

            <div class="back-link">
                <a data-link href="/login">← Back to Sign In</a>
            </div>
        </div>

        <!-- SUCCESS STATE -->
        <div class="success-content" id="successCard" style="display: none">
            <div class="success-icon">
                <svg
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="3"
                        viewBox="0 0 24 24"
                >
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
            </div>

            <h3 class="success-title">Email sent successfully!</h3>

            <p class="success-description">
                Check your inbox and follow the instructions to reset your password.
            </p>

            <div class="success-email" id="sentToEmail"></div>

            <div class="action-buttons">
                <button class="btn-secondary-base" id="resendBtn">
                    Didn't receive it? Resend
                </button>
            </div>

            <div class="back-link">
                <a data-link href="/login">← Back to Sign In</a>
            </div>
        </div>
    </div>
</div>
